  - kind: ethereum
    name: MantuaPredictionMarket
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000005"
      abi: MantuaPredictionMarket
      startBlock: 18000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PredictionMarket
        - PredictionBet
        - PredictionClaim
        - Protocol
      abis:
        - name: MantuaPredictionMarket
          file: ./abis/MantuaPredictionMarket.json
      eventHandlers:
        - event: MarketCreated(indexed uint256,string,string,uint256,address)
          handler: handleMarketCreated
        - event: SharesBought(indexed uint256,indexed address,bool,uint256,uint256)
          handler: handleSharesBought
        - event: MarketResolved(indexed uint256,bool)
          handler: handleMarketResolved
        - event: WinningsClaimed(indexed uint256,indexed address,uint256)
          handler: handleWinningsClaimed
      file: ./src/prediction-market.ts
