specVersion: 1.0.0
indexerHints:
  prune: auto

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: PoolManager
    network: base-sepolia
    source:
      address: "0x05E73354cFDd6745C338b50BcFDfA3Aa6fA03408"
      abi: PoolManager
      startBlock: 18000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Token
        - Swap
        - Position
        - SwapHourData
        - Protocol
        - ProtocolDayData
      abis:
        - name: PoolManager
          file: ./abis/PoolManager.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Initialize(indexed bytes32,indexed address,indexed address,uint24,int24,address)
          handler: handleInitialize
        - event: Swap(indexed bytes32,indexed address,int128,int128,uint160,uint128,int24,uint24)
          handler: handleSwap
        - event: ModifyLiquidity(indexed bytes32,indexed address,int24,int24,int256,bytes32)
          handler: handleModifyLiquidity
      file: ./src/pool-manager.ts

  - kind: ethereum
    name: MantuaVaultETHUSDC
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000001"
      abi: MantuaVault
      startBlock: 18000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vault
        - VaultDeposit
        - VaultWithdrawal
        - VaultDayData
        - Protocol
      abis:
        - name: MantuaVault
          file: ./abis/MantuaVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
      file: ./src/vault.ts

  - kind: ethereum
    name: MantuaVaultUSDCUSDT
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000002"
      abi: MantuaVault
      startBlock: 18000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vault
        - VaultDeposit
        - VaultWithdrawal
        - VaultDayData
        - Protocol
      abis:
        - name: MantuaVault
          file: ./abis/MantuaVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
      file: ./src/vault.ts

  - kind: ethereum
    name: MantuaVaultETHBTC
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000003"
      abi: MantuaVault
      startBlock: 18000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vault
        - VaultDeposit
        - VaultWithdrawal
        - VaultDayData
        - Protocol
      abis:
        - name: MantuaVault
          file: ./abis/MantuaVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
      file: ./src/vault.ts

  - kind: ethereum
    name: MantuaVaultAIMulti
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000004"
      abi: MantuaVault
      startBlock: 18000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vault
        - VaultDeposit
        - VaultWithdrawal
        - VaultDayData
        - Protocol
      abis:
        - name: MantuaVault
          file: ./abis/MantuaVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
